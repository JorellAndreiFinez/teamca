services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamca-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - teamca-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamca-frontend
    restart: unless-stopped
    ports:
      - "4321:4321"
    depends_on:
      - backend
    networks:
      - teamca-net

networks:
  teamca-net:
    driver: bridge